<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | Batshas Holdings & Enterprises</title>
  <link rel="icon" type="image/png" href="assets/img/icon.png">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <header class="site-header">
    <nav class="nav">
      <a href="index.html" class="brand brand-nav">
        <img class="brand-icon" src="assets/img/icon.png" alt="Batshas Holdings & Enterprises">
        <span class="brand-text">Batshas Holdings <span class="brand-break">& Enterprises</span></span>
      </a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="services.html">Services</a>
        <a href="compliance.html">Compliance</a>
        <a href="learners.html" class="active">Learners</a>
        <a href="projects.html">Projects</a>
        <a href="contact.html">Contact</a>
      </div>
    </nav>
  </header>

  <main>
    <section class="portal-wrap register-page">
      <div class="register-shell">
        <div class="register-copy">
          <p class="login-kicker">Learner Registration</p>
          <h1>Create Learner Profile</h1>
        </div>

        <form class="form-panel register-panel" id="registerForm">
          <div class="register-progress" aria-label="Registration progress">
            <span class="is-active" data-step-indicator="1">1</span>
            <span data-step-indicator="2">2</span>
            <span data-step-indicator="3">3</span>
          </div>

          <fieldset class="register-step is-active" data-register-step="1">
            <legend>Personal details</legend>
            <div class="register-fields">
              <div class="form-row floating-field">
                <input id="regName" maxlength="60" autocomplete="given-name" placeholder=" " required>
                <label for="regName">Name</label>
              </div>
              <div class="form-row floating-field">
                <input id="regSurname" maxlength="60" autocomplete="family-name" placeholder=" " required>
                <label for="regSurname">Surname</label>
              </div>
              <div class="form-row floating-field">
                <input id="regPhone" type="tel" inputmode="tel" autocomplete="tel" placeholder=" " required>
                <label for="regPhone">Phone Number</label>
              </div>
              <div class="form-row floating-field">
                <input id="regAddress" maxlength="140" autocomplete="street-address" placeholder=" " required>
                <label for="regAddress">House Address</label>
              </div>
            </div>
          </fieldset>

          <fieldset class="register-step" data-register-step="2">
            <legend>Account details</legend>
            <div class="register-fields">
              <div class="form-row floating-field">
                <input id="regProvince" maxlength="60" autocomplete="address-level1" placeholder=" " required>
                <label for="regProvince">Province</label>
              </div>
              <div class="form-row floating-field">
                <input id="regEmail" type="email" autocomplete="email" placeholder=" " required>
                <label for="regEmail">Email Address</label>
              </div>
              <div class="form-row floating-field">
                <input id="regPass" type="password" minlength="15" maxlength="128" autocomplete="new-password" placeholder=" " required>
                <label for="regPass">Password</label>
              </div>
              <div class="form-row floating-field">
                <input id="regPassConfirm" type="password" minlength="15" maxlength="128" autocomplete="new-password" placeholder=" " required>
                <label for="regPassConfirm">Confirm Password</label>
              </div>
            </div>
          </fieldset>

          <section class="register-step register-confirm" data-register-step="3" aria-label="Confirm learner details">
            <h2>Confirm Details</h2>
            <div class="confirm-grid" id="registerSummary"></div>
            <label class="terms-check">
              <input id="regTerms" type="checkbox">
              <span>I agree with the <a href="terms.html">Terms &amp; Conditions</a>.</span>
            </label>
          </section>

          <div class="register-actions">
            <button class="btn register-back" type="button" id="registerBack" hidden>Back</button>
            <button class="btn register-next" type="button" id="registerNext" disabled>Continue</button>
            <button class="btn btn-red register-submit" type="submit" id="registerSubmit" hidden disabled>Register</button>
          </div>
          <div id="regNotice" class="notice"></div>
        </form>
      </div>
    </section>

    <footer class="footer">
      <div class="footer-shell">
        <nav class="footer-links" aria-label="Footer links">
          <a href="services.html">Services</a>
          <a href="terms.html">Terms</a>
          <a href="privacy.html">Privacy</a>
          <a href="compliance.html">Compliance</a>
          <a href="projects.html">Projects</a>
        </nav>
        <div class="footer-meta">
          <span>Batshas Holdings and Enterprises (Pty) Ltd</span>
          <span>&copy; 2024</span>
        </div>
      </div>
    </footer>
  </main>

  <script src="js/main.js"></script>
  <script type="module" src="js/learners/auth.js"></script>
</body>
</html>
